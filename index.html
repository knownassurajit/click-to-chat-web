<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click to Chat — Private & Instant WhatsApp Messaging</title>
  <meta name="description" content="Open a WhatsApp chat instantly with one-time contacts without saving their numbers or sharing your contacts sync permissions. Privacy-first, local-only.">
  
  <!-- Favicon -->
  <link rel="icon" href="favicon.ico">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <main class="m3-dialog">
      
      <!-- Header -->
      <header class="dialog-header">
        <h1 class="dialog-title">
          <span class="material-symbols-outlined" style="font-size: 32px;">chat</span>
          Click to Chat
        </h1>
        <p class="dialog-subtitle">
          Message one-time contacts (like drivers or sellers) privately without sharing your contact list.
        </p>
      </header>

      <!-- Main Input Form -->
      <section class="btn-group">
        <div class="input-row">
          
          <!-- Country Prefix Selector (Custom M3 OutlinedTextField) -->
          <div class="m3-textfield prefix-container is-active" id="country-textfield" style="position: relative;">
            <div class="m3-textfield-outline" id="country-trigger-container">
              <button type="button" id="country-trigger" class="country-trigger">
                <span id="selected-flag" class="country-flag">🇮🇳</span>
                <span id="selected-code" class="country-code-text">+91</span>
                <span class="material-symbols-outlined country-dropdown-arrow">arrow_drop_down</span>
              </button>
              <label class="m3-textfield-label">Country</label>
            </div>
            
            <!-- Country Search Dropdown -->
            <div id="country-popover" class="country-popover-panel" style="display: none;">
              <div class="search-container">
                <span class="material-symbols-outlined search-icon">search</span>
                <input type="text" id="country-search" class="search-input" placeholder="Search country..." autocomplete="off">
              </div>
              <div id="country-list" class="country-list">
                <!-- Dynamically populated -->
              </div>
            </div>
            
            <div class="m3-textfield-support"></div>
          </div>
          
          <!-- Phone Number Input (Custom M3 OutlinedTextField) -->
          <div class="m3-textfield" id="phone-textfield">
            <div class="m3-textfield-outline">
              <input type="tel" id="phone-number" class="m3-textfield-input" placeholder=" " autocomplete="off">
              <label class="m3-textfield-label" for="phone-number">Phone Number</label>
            </div>
            <div class="m3-textfield-support" id="phone-error-text"></div>
          </div>
          
        </div>

        <!-- Primary Action Button (Extended FAB / High-emphasis Filled Button) -->
        <button id="btn-open-chat" class="btn-primary" onclick="openChat()" disabled>
          <span class="material-symbols-outlined btn-icon">send</span>
          Open Chat
        </button>
      </section>

      <!-- Link Generator Card -->
      <section class="link-card">
        <span class="link-card-label">Shareable Link</span>
        <div class="link-display-row">
          <span id="generated-link" class="link-text">wa.me/...</span>
          <button id="btn-copy-link" class="btn-copy" onclick="copyLink()" title="Copy link to clipboard" disabled>
            <span class="material-symbols-outlined" style="font-size: 20px;">content_copy</span>
          </button>
        </div>
      </section>

      <!-- Session History Section (Local Only) -->
      <section class="history-section">
        <div class="history-header">
          <h2 class="history-title">Recent Chats (Local Only)</h2>
          <button id="btn-clear-history" class="btn-clear-history" style="display: none;">Clear All</button>
        </div>
        <div id="history-empty" class="history-empty">
          No recent chats. Your dials are kept private and local.
        </div>
        <div id="history-list" class="history-list">
          <!-- Dynamically populated -->
        </div>
      </section>
      
    </main>
  </div>



  <!-- Toast Feedbacks -->
  <div id="toast-message" class="m3-toast">
    <span class="material-symbols-outlined" style="color: var(--md-sys-color-primary);">check_circle</span>
    <span class="toast-text">Link copied to clipboard!</span>
  </div>

  <!-- App Script -->
  <script src="app.js"></script>
</body>
</html>
